
image: freebsd/14.x

sources:
  - https://git.sr.ht/~thestr4ng3r/chiaki

packages:
  - cmake
  - protobuf
  - python3
  - py311-setuptools # should not be needed with nanopb >= 0.4.9
  - py311-protobuf
  - opus
  - qt5-core
  - qt5-qmake
  - qt5-buildtools
  - qt5-gui
  - qt5-widgets
  - qt5-concurrent
  - qt5-svg
  - qt5-opengl
  - qt5-multimedia
  - ffmpeg
  - sdl2

tasks:
  - build: |
      cd chiaki
      mkdir build && cd build
      cmake ..
      make -j4
      test/chiaki-unit

